  summary: >-
    Parses the peek command parameters, extracting the target varaible name, array 

    name, and index expression. The expected syntax is "peek var = arrayName index", where "var" 

    is the target variable to assign the value to, "arrayName", is the name of the array to peek from,

    and "index" is the expression for the index to peek at.
